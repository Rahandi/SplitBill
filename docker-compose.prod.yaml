services:
  server:
    image: ghcr.io/rahandi/splitbill-server:latest
    restart: unless-stopped
    environment:
      DB_HOST: central-mysql
      DB_USER: ${DB_USER:-splitbill}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-splitbill}
    networks:
      - central-db

  web:
    image: ghcr.io/rahandi/splitbill-web:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - server

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: true
      REPO_USER: ${GHCR_USER}
      REPO_PASS: ${GHCR_TOKEN}
      DOCKER_API_VERSION: "1.41"

networks:
  central-db:
    external: true
    name: central-db
