services:
  db:
    image: mysql:9.4
    container_name: splitbill-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=splitbill
      - MYSQL_USER=splitbill
      - MYSQL_PASSWORD=splitbill
    ports:
      - "3306:3306"
    volumes:
      - ./database:/var/lib/mysql

  server:
    build: ./server
    container_name: splitbill-server
    restart: unless-stopped
    environment:
      - DB_HOST=db
    ports:
      - "5000:5000"
    depends_on:
      - db

  web:
    build: ./web
    container_name: splitbill-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server
